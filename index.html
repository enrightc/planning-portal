<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Portal</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>
</head>
<body>

    <div id="map"></div>

    <div id="results-panel" class="hidden">
        <div id="results-header">
            <h2>Intersecting Features</h2>
            <button id="close-results">&#x2715;</button>
        </div>
        

        <!-- Tab links -->
        <div class="tab">
        <button class="tablinks" onclick="openFeature(event, 'scheduled-monuments')">Scheduled Monuments</button>
        <button class="tablinks" onclick="openFeature(event, 'listed-buildings')">Listed Buildings</button>
        </div>

        <!-- Tab content -->
        <div id="scheduled-monuments" class="tabcontent">
            <h3>Scheduled Monuments</h3>
        </div>

        <div id="listed-buildings" class="tabcontent">
            <h3>Listed Buildings</h3>
        </div>

        <div id="results-list"></div>

    </div>

    <script src="map.js"></script>

</body>
</html>
